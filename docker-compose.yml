services:
  db:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: dscae-db
    environment:
      ORACLE_PASSWORD:    ${ORACLE_PASSWORD}
      APP_USER:           ${APP_USER}
      APP_USER_PASSWORD:  ${APP_USER_PASSWORD}
      DB_SERVICE:         ${DB_SERVICE}
      DB_PORT:            ${DB_PORT}
    # No host port binding by default — the web container reaches the DB
    # via the docker network at db:1521. Uncomment to expose for sqlplus
    # from the host, or run `docker compose exec db sqlplus`.
    # ports:
    #   - "${DB_PORT}:1521"
    volumes:
      - ./sql:/opt/sql:ro
      - ./docker/init.sh:/container-entrypoint-initdb.d/init.sh:ro
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  web:
    build: .
    container_name: dscae-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER:          ${DB_USER}
      DB_PASSWORD:      ${DB_PASSWORD}
      DB_HOST:          db
      DB_PORT:          ${DB_PORT}
      DB_SERVICE:       ${DB_SERVICE}
      DB_POOL_MIN:      ${DB_POOL_MIN}
      DB_POOL_MAX:      ${DB_POOL_MAX}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      WEB_CONCURRENCY:  ${WEB_CONCURRENCY}
      WEB_TIMEOUT:      ${WEB_TIMEOUT}
    ports:
      - "${PORT}:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/login').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  oracle-data:
